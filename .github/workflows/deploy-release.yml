name: Build & Release OpenRealm-Data

on:
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout openrealm-data
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve openrealm dependency version
        id: openrealm-version
        run: |
          OPENREALM_VERSION=$(grep -A1 '<artifactId>openrealm</artifactId>' pom.xml | grep '<version>' | sed 's/.*<version>\(.*\)<\/version>.*/\1/')
          echo "version=$OPENREALM_VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout openrealm dependency
        uses: actions/checkout@v4
        with:
          repository: ruusey/openrealm
          ref: v${{ steps.openrealm-version.outputs.version }}
          path: openrealm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install openrealm dependency
        run: |
          mvn -B versions:set -DnewVersion=${{ steps.openrealm-version.outputs.version }} -DgenerateBackupPoms=false -f openrealm/pom.xml
          mvn -B clean install -DskipTests -f openrealm/pom.xml

      - name: Extract version from pom.xml
        id: version
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            LOG=$(git log --oneline --no-merges -20)
          else
            LOG=$(git log --oneline --no-merges "$PREV_TAG"..HEAD)
          fi
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "log<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"

      - name: Build openrealm-data
        run: mvn -B package -DskipTests --file pom.xml

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: OpenRealm-Data v${{ steps.version.outputs.version }}
          body: |
            ## OpenRealm-Data v${{ steps.version.outputs.version }}

            Game data service fat JAR. Requires openrealm v${{ steps.openrealm-version.outputs.version }}.

            ### Changes
            ${{ steps.changelog.outputs.log }}
          draft: false
          prerelease: false
          files: target/openrealm-data.jar
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
