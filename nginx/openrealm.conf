# OpenRealm HTTPS reverse proxy
#
# TLS termination for the data service (HTTPS) and game server WebSocket (WSS).
# Backends stay plain HTTP/WS — nginx handles all the SSL.
#
# Setup:
#   1. Install nginx:        sudo apt install nginx
#   2. Install certbot:      sudo apt install certbot python3-certbot-nginx
#   3. Copy this file:       sudo cp openrealm.conf /etc/nginx/sites-available/openrealm
#   4. Enable it:            sudo ln -s /etc/nginx/sites-available/openrealm /etc/nginx/sites-enabled/
#   5. Remove default:       sudo rm /etc/nginx/sites-enabled/default
#   6. Get cert:             sudo certbot --nginx -d openrealm.net
#   7. Reload:               sudo nginx -t && sudo systemctl reload nginx
#
# Certbot auto-renews via systemd timer. Check with: systemctl status certbot.timer

# --- Upstream definitions ---
# Data service (Spring Boot) — serves webclient, REST APIs, game assets
upstream data_service {
    server 127.0.0.1:8080;
}

# Game servers — plain WebSocket on port 2223
upstream gs_useast {
    server 100.55.103.226:2223;
}
upstream gs_euwest {
    server 51.24.13.231:2223;
}
upstream gs_local {
    server 127.0.0.1:2223;
}

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    server_name openrealm.net;

    # Let certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main HTTPS server ---
server {
    listen 443 ssl http2;
    server_name openrealm.net;

    # Managed by certbot — paths filled in during `certbot --nginx`
    ssl_certificate     /etc/letsencrypt/live/openrealm.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/openrealm.net/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # --- WebSocket routes (WSS → WS) ---
    # Each game server gets a path. The webclient connects to
    # wss://openrealm.net/ws/<server> and nginx proxies to the
    # plain WS backend. Game servers stay completely untouched.

    location /ws/useast {
        proxy_pass http://gs_useast;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /ws/euwest {
        proxy_pass http://gs_euwest;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    location /ws/local {
        proxy_pass http://gs_local;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # --- Data service (HTTPS → HTTP) ---
    # Everything else goes to the Spring Boot data service
    location / {
        proxy_pass http://data_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }
}
