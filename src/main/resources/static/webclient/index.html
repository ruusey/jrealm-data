<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="screen-orientation" content="landscape">
    <meta name="mobile-web-app-capable" content="yes">
    <title>OpenRealm</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.3.2/pixi.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
</head>
<body>
    <!-- Rotate prompt for portrait mobile -->
    <div id="rotate-prompt">
        <span>&#x1F504;</span>
        <p>Please rotate your device to landscape mode</p>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" class="screen active">
        <div class="login-box">
            <h1>JRealm</h1>
            <p class="subtitle">Web Client</p>
            <form id="login-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required autocomplete="email" tabindex="1">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password" tabindex="2">
                </div>
                <div class="form-group">
                    <label for="server-addr">Game Server</label>
                    <select id="server-addr">
                        <option value="openrealm.net" selected>Production (openrealm.net)</option>
                        <option value="localhost">Local (localhost)</option>
                    </select>
                </div>
                <button type="submit" id="login-btn">Login</button>
                <p id="login-error" class="error"></p>
                <p class="register-link">No account? <a href="#" id="show-register">Register</a></p>
            </form>
            <!-- Register Form (hidden by default) -->
            <form id="register-form" style="display:none">
                <div class="form-group">
                    <label for="reg-name">Username</label>
                    <input type="text" id="reg-name" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <input type="email" id="reg-email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="reg-password">Password</label>
                    <input type="password" id="reg-password" required autocomplete="new-password">
                </div>
                <div class="form-group">
                    <label for="reg-server">Game Server</label>
                    <select id="reg-server">
                        <option value="openrealm.net" selected>Production (openrealm.net)</option>
                        <option value="localhost">Local (localhost)</option>
                    </select>
                </div>
                <button type="submit" id="register-btn">Register</button>
                <p id="register-error" class="error"></p>
                <p class="register-link"><a href="#" id="show-login">Back to Login</a></p>
            </form>
        </div>
    </div>

    <!-- Character Select Screen -->
    <div id="charselect-screen" class="screen">
        <div class="charselect-box">
            <h2>Select Character</h2>
            <div id="char-list"></div>
            <div class="char-actions">
                <button id="play-btn" disabled>Play</button>
                <button id="delete-char-btn" class="danger" disabled>Delete</button>
            </div>
            <div class="char-create">
                <h3>Create Character</h3>
                <div id="class-picker"></div>
                <button id="create-char-btn" disabled>Create</button>
            </div>
            <div class="chest-section">
                <span id="chest-count">Vault Chests: 0</span>
                <button id="add-chest-btn" class="small">+ Add Chest</button>
            </div>
            <div class="password-section">
                <details>
                    <summary>Change Password</summary>
                    <div class="form-group">
                        <input type="password" id="current-pw" placeholder="Current password">
                    </div>
                    <div class="form-group">
                        <input type="password" id="new-pw" placeholder="New password">
                    </div>
                    <div class="form-group">
                        <input type="password" id="confirm-pw" placeholder="Confirm new password">
                    </div>
                    <button id="change-pw-btn" class="small">Update Password</button>
                    <p id="pw-status" class="error"></p>
                </details>
            </div>
            <button id="logout-btn" class="secondary">Back</button>
            <p id="char-error" class="error"></p>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen">
        <div id="game-canvas-container"></div>
        <!-- HUD Overlay -->
        <div id="hud">
            <div id="hud-bars">
                <div class="bar-container">
                    <div id="hp-bar" class="bar hp"><span id="hp-text">0/0</span></div>
                </div>
                <div class="bar-container">
                    <div id="mp-bar" class="bar mp"><span id="mp-text">0/0</span></div>
                </div>
                <div class="bar-container">
                    <div id="xp-bar" class="bar xp"><span id="xp-text">Lv 0</span></div>
                </div>
            </div>
            <div id="stats-panel"></div>
            <div id="inventory-panel">
                <div id="equip-label">Equipment</div>
                <div id="equip-slots" class="slot-row"></div>
                <div id="inv-label">Inventory</div>
                <div id="inv-slots" class="slot-row"></div>
            </div>
            <div id="ground-loot-panel" style="display:none">
                <h4>Loot Bag</h4>
                <div id="ground-loot-slots" class="slot-row"></div>
            </div>
            <div id="trade-buttons" style="display:none">
                <button id="trade-confirm-btn" class="trade-btn confirm">Confirm Trade</button>
                <button id="trade-cancel-btn" class="trade-btn cancel">Cancel Trade</button>
            </div>
            <div id="nearby-section">
                <div id="nearby-label" style="font-size:10px;color:#887868;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;">Players Nearby</div>
                <div id="nearby-players"></div>
            </div>
        </div>
        <!-- Chat -->
        <div id="chat-panel">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Press Enter to chat..." autocomplete="off">
        </div>
        <!-- Connection Status -->
        <div id="connection-status">Connecting...</div>
    </div>

    <!-- Mobile touch controls -->
    <div id="touch-joystick" style="display:none">
        <div id="joystick-base"><div id="joystick-thumb"></div></div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
